<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>限界焼肉 -タクティカルUIエディション-</title>
<style>
:root {
  --color-bg: #121212;
  --color-card: #1e1e1e;
  --color-border: #333;
  --color-text-main: #ffffff;
  --color-text-sub: #aaaaaa;
  --color-accent: #e8a020;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--color-bg);
  color: var(--color-text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  overflow: hidden;
}

#app {
  width: 100%;
  max-width: 480px; /* スマホ幅に最適化 */
  height: 96vh;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ★おじさんの天地はそのままで維持 */
.ojisan-header {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  background: var(--color-card); border-radius: 12px; border: 1px solid var(--color-border);
  padding: 10px; position: relative;
  flex: 0 0 auto; /* 天地を固定 */
  height: 200px; /* 具体的な高さを指定 */
}
.ojisan-avatar {
  width: 100px; height: 100px;
  border-radius: 50%; background: #2a3d2a;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px; border: 3px solid #555; overflow: hidden;
  transition: all 0.3s;
}
.level-1 .ojisan-avatar { background: #3d3d1a; border-color: var(--color-accent); }
.level-2 .ojisan-avatar { background: #3d1a1a; border-color: #ff6060; animation: tremble 0.15s infinite; }
.ojisan-serif {
  font-size: 13px; font-weight: bold; color: var(--color-accent); margin-top: 6px;
  min-height: 18px;
}

@keyframes tremble {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  20% { transform: translate(-1px, -1px) rotate(-1deg); }
  40% { transform: translate(-1px, 1px) rotate(1deg); }
  60% { transform: translate(1px, -1px) rotate(0deg); }
  80% { transform: translate(-1px, 1px) rotate(-1deg); }
  100% { transform: translate(1px, 1px) rotate(1deg); }
}

/* ★これ以外の天地を縮小 */
/* メインゲームエリア（左スコア、右盤面） */
.main-game-area {
  display: flex; flex: 1; gap: 8px; min-height: 0;
  height: calc(100% - 200px - 60px - 40px); /* 全体からおじさん、ログ、アクションパネルの高さを引いた残り */
}

/* 左側：縦積みスコア＆じゃんけんスペース */
.sidebar-left {
  width: 85px; display: flex; flex-direction: column;
  background: var(--color-card); border-radius: 12px; border: 1px solid var(--color-border);
  padding: 8px 4px; justify-content: space-between; align-items: center;
  position: relative;
  height: 100%;
}
.side-score { text-align: center; width: 100%; }
.side-score.opp { color: #ff6060; }
.side-score.self { color: #60a0ff; }
.side-label { font-size: 10px; color: var(--color-text-sub); }
.side-num { font-size: 22px; font-weight: bold; }
.side-num small { font-size: 10px; }

/* じゃんけん中央アクティブエリア（ルーレット風） */
.janken-center-zone {
  width: 72px; height: 130px; display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 6px;
  position: relative; perspective: 100px;
}
.jbtn-mini {
  width: 50px; height: 36px; font-size: 20px;
  border-radius: 8px; border: 1px solid var(--color-border);
  background: #2a2a2a; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
/* じゃんけん時以外は半透明で触れなくする（煩わしさ解消） */
.janken-center-zone.inactive {
  opacity: 0.15; pointer-events: none; filter: grayscale(1);
}
/* じゃんけんアクティブ時のルーレット風アニメ効果 */
.janken-center-zone.active .jbtn-mini {
  animation: rouletteUpDown 2s infinite ease-in-out;
  border-color: var(--color-accent);
  box-shadow: 0 0 8px rgba(232, 160, 32, 0.3);
}
.janken-center-zone.active .jbtn-mini:nth-child(2) { animation-delay: 0.3s; }
.janken-center-zone.active .jbtn-mini:nth-child(3) { animation-delay: 0.6s; }

@keyframes rouletteUpDown {
  0%, 100% { transform: translateZ(0); }
  50% { transform: translateZ(5px) scale(1.05); background: #3a3a3a; }
}

/* 右側：盤面を最大限広く確保 */
.grid-container {
  flex: 1; display: flex; flex-direction: column;
  height: 100%;
}
.grid {
  flex: 1; display: grid; grid-template-rows: repeat(3, 1fr); grid-template-columns: repeat(5, 1fr);
  gap: 5px; background: #1a1108; border-radius: 12px; padding: 8px;
  border: 3px solid #3d2b14; touch-action: manipulation;
}
.cell {
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  position: relative; transition: background-color 0.2s;
}
.zone-opp  { background: #261212; border: 1px solid #4a1a1a; }
.zone-mid  { background: #130f0a; border: 1px solid #332514; }
.zone-self { background: #122612; border: 1px solid #1a4a1a; }

.selectable {
  outline: 3px solid var(--color-accent); outline-offset: -3px;
  background-color: #4a3410 !important; cursor: pointer;
  animation: pulse 0.8s infinite alternate;
}
@keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(0.97); } }

.cell-inner { display: flex; flex-direction: column; align-items: center; }
.meat-icon { font-size: 26px; line-height: 1; }
.meat-badge { font-size: 8px; font-weight: bold; padding: 1px 3px; border-radius: 3px; margin-top: 1px; }
.badge-raw    { background: #1a4a1a; color: #a0ffa0; }
.badge-cooked { background: #542b00; color: #ffb050; }

/* 下部操作パネル（天地を縮小） */
.action-panel {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: 12px;
  padding: 8px; /* 天地を縮小 */
  flex: 0 0 auto;
  height: 40px; /* 具体的な高さを指定 */
  display: flex;
  align-items: center;
  justify-content: center;
}
.action-title { font-size: 11px; color: var(--color-text-sub); text-align: center; margin-bottom: 0px; }

.janken-btns { display: flex; gap: 8px; justify-content: center; height: 100%; align-items: center;}
.jbtn {
  font-size: 28px; flex: 1; max-width: 70px; height: 100%;
  border-radius: 8px; border: 2px solid #444;
  background: #2a2a2a; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 0 #111;
}
.jbtn:active { background: #444; transform: translateY(2px); box-shadow: none; }

.act-btns { display: flex; gap: 6px; justify-content: center; width: 100%; height: 100%; align-items: center; }
.abtn {
  flex: 1; padding: 10px 0; border-radius: 8px;
  border: 1px solid var(--color-border); background: #2a2a2a;
  font-size: 12px; font-weight: bold; color: var(--color-text-main); cursor: pointer;
  height: 100%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 0 #111;
}
.abtn:disabled { opacity: 0.15; box-shadow: none; cursor: not-allowed; }
.abtn.active { background: #542b00; color: #ffb050; border-color: var(--color-accent); }
.abtn-submit { background: var(--color-accent); color: #000; border: none; font-size: 12px; box-shadow: 0 3px 0 #a67010; }
.abtn:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }

/* ログボックスの高さをスリムに */
.log-box {
  font-size: 12px; color: var(--color-text-sub); font-weight: bold;
  min-height: 36px; text-align: center; padding: 4px 10px;
  background: var(--color-card); border-radius: 10px;
  border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
  height: 60px; /* 具体的な高さを指定 */
}
.npc-thinking { color: #ff6060; animation: pulse 0.5s infinite alternate; font-size: 12px; }

/* じゃんけん・結果の中央透過モーダル構造 */
.modal-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(2px); border-radius: 12px;
  display: flex; justify-content: center; align-items: center; z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-card {
  background: #222222; border: 3px solid var(--color-accent); border-radius: 16px;
  padding: 16px; width: 85%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  transform: scale(0.85); transition: transform 0.2s ease;
}
.modal-overlay.active .modal-card { transform: scale(1); }
.modal-res-icon { font-size: 44px; margin-bottom: 4px; }
.modal-res-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
.modal-res-body { font-size: 13px; color: var(--color-text-sub); margin-bottom: 12px; }

/* タイトル画面 */
.title-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; padding: 20px; }
.title-logo { font-size: 48px; font-weight: 900; color: #ff3333; text-shadow: 3px 3px 0px #000, 0 0 20px rgba(232,160,32,0.6); margin-bottom: 6px; letter-spacing: 4px; animation: glow 1.5s ease-in-out infinite alternate; }
.title-sub { font-size: 13px; color: var(--color-text-sub); margin-bottom: 40px; font-weight: bold; }
.title-btns { display: flex; flex-direction: column; gap: 14px; width: 80%; max-width: 240px; }
.title-btn { padding: 14px 0; border-radius: 12px; border: 2px solid #444; background: #222; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #111; }
.title-btn:active { transform: translateY(2px); box-shadow: none; }
.title-btn.main-btn { background: var(--color-accent); color: #000; border: none; font-size: 17px; box-shadow: 0 4px 0 #a67010; }
@keyframes glow { from { text-shadow: 0 0 10px rgba(255,50,50,0.5), 3px 3px 0px #000; } to { text-shadow: 0 0 25px rgba(232,160,32,0.9), 3px 3px 0px #000; } }

/* ゲームオーバー画面 */
.gameover-wrap { text-align: center; padding: 20px 10px; height: 100%; width: 100%; background: var(--color-card); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.result-icon { font-size: 54px; margin-bottom: 8px; }
.result-title { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
.result-sub { font-size: 12px; color: var(--color-text-sub); margin-bottom: 20px; padding: 0 10px; }
.result-scores { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; width: 100%; }
.rscore-card { padding: 10px; border-radius: 8px; border: 1px solid var(--color-border); background: #252525; flex: 1; }
.rscore-card.loser { border: 2px solid #ff6060; background: #331515; }
.rscore-label { font-size: 10px; color: var(--color-text-sub); margin-bottom: 2px; }
.rscore-num { font-size: 20px; font-weight: bold; }
.restart-btn { width: 100%; max-width: 180px; padding: 12px 0; border-radius: 10px; background: var(--color-accent); border: none; font-size: 15px; font-weight: bold; color: #000; cursor: pointer; }
.help-text { font-size: 12px; text-align: left; color: #ccc; line-height: 1.5; max-height: 200px; overflow-y: auto; margin-bottom: 16px; padding: 8px; background: #151515; border-radius: 8px; }
</style>
</head>
<body>

<div id="app"></div>

<div id="janken-modal" class="modal-overlay">
  <div class="modal-card">
    <div id="modal-icon" class="modal-res-icon">🎉</div>
    <div id="modal-title" class="modal-res-title">じゃんけん勝利！</div>
    <div id="modal-body" class="modal-res-body">✊ vs ✌️</div>
    <button class="abtn abtn-submit" style="width:100%; max-width:130px; margin:0 auto;" onclick="closeModal()">進む</button>
  </div>
</div>

<script>
const PLAYER = 0, NPC = 1;
const JK = ['✊','✌️','✋'];

const IMAGES = { meat_raw: '', meat_cooked: '', ojisan_0: '', ojisan_1: '', ojisan_2: '' };
var G = {};

function initGame() {
  var cells = [];
  for (var r = 0; r < 3; r++) {
    for (var c = 0; c < 5; c++) {
      cells.push({ r: r, c: c, meat: null });
    }
  }
  G = {
    screen: 'title', 
    phase: 'setup',  
    currentPlayer: PLAYER, actionDone: false, selectedAction: null,
    scores: [0, 0], gameOver: false, log: 'いざ、限界焼肉勝負！',
    cells: cells, turn: 1, npcThinking: false
  };
}
initGame();

function startMeatSetupAnimation() {
  G.phase = 'setup';
  G.log = '店員が新鮮なお肉を運んできた…！';
  render();
  var midRowCols = [0, 1, 2, 3, 4];
  var delay = 180;
  midRowCols.forEach(function(colIndex, index) {
    setTimeout(function() {
      var cell = getCell(1, colIndex);
      if (cell) { cell.meat = { status: 'raw' }; render(); }
      if (index === midRowCols.length - 1) {
        setTimeout(function() {
          G.phase = 'janken'; G.log = '第' + G.turn + '回戦 — じゃんけんの手を選んでください。'; render();
        }, 350);
      }
    }, (index + 1) * delay);
  });
}

function getCell(r, c) {
  for (var i = 0; i < G.cells.length; i++) { if (G.cells[i].r === r && G.cells[i].c === c) return G.cells[i]; }
  return null;
}
function jkResult(a, b) {
  if (a === b) return 'draw';
  if ((a===0&&b===2)||(a===1&&b===0)||(a===2&&b===1)) return 'win';
  return 'lose';
}
function canBake(cell) { return cell.meat !== null && cell.meat.status === 'raw'; }
function canMove(cell, player) {
  if (!cell.meat || cell.meat.status !== 'cooked') return false;
  var dir = (player === PLAYER) ? -1 : 1;
  var nr = cell.r + dir;
  if (nr < 0 || nr > 2) return true;
  return getCell(nr, cell.c).meat === null;
}
function getBakeCells() { return G.cells.filter(canBake); }
function getMoveCells(player) { return G.cells.filter(function(c) { return canMove(c, player); }); }
function remainingMeat() { return G.cells.filter(function(c) { return c.meat !== null; }).length; }

function doAction(action, cell, player) {
  var msg = '';
  if (action === 'bake') {
    cell.meat.status = 'cooked'; msg = '網の上の肉が育った！🔥';
  } else if (action === 'move') {
    var dir = (player === PLAYER) ? -1 : 1;
    var nr = cell.r + dir;
    var meatCopy = { status: cell.meat.status };
    cell.meat = null;
    if (nr < 0 || nr > 2) {
      G.scores[player]++;
      msg = (player === PLAYER) ? '🍖 おじさんの皿に押し込んだ！' : '😱 自分の皿に滑り込んできた…！';
      if (remainingMeat() === 0) { G.gameOver = true; G.screen = 'gameover'; }
    } else {
      getCell(nr, cell.c).meat = meatCopy; msg = '肉の位置をスライドさせた！';
    }
  }
  return msg;
}

function endTurn() {
  G.actionDone = false; G.selectedAction = null; G.phase = 'janken'; G.turn++;
}

function npcAct() {
  var moveCells = getMoveCells(NPC); var bakeCells = getBakeCells(); var action, cell;
  var frontMove = moveCells.filter(function(c) { return c.r === 2; });
  if (frontMove.length > 0) { action = 'move'; cell = frontMove[Math.floor(Math.random() * frontMove.length)]; }
  else if (moveCells.length > 0 && Math.random() < 0.6) { action = 'move'; cell = moveCells[Math.floor(Math.random() * moveCells.length)]; }
  else if (bakeCells.length > 0) { action = 'bake'; cell = bakeCells[Math.floor(Math.random() * bakeCells.length)]; }
  else if (moveCells.length > 0) { action = 'move'; cell = moveCells[Math.floor(Math.random() * moveCells.length)]; }
  else { endTurn(); G.log = 'おじさんはパスした。'; G.npcThinking = false; render(); return; }

  G.log = doAction(action, cell, NPC); G.npcThinking = false;
  if (!G.gameOver) endTurn();
  render();
}

window.playJanken = function(choice) {
  if (G.phase !== 'janken' || G.npcThinking) return;
  var npc = Math.floor(Math.random() * 3); var res = jkResult(choice, npc);
  var ems = ['✊','✌️','✋'];
  
  if (res === 'draw') {
    showJankenModal('🤝', 'あいこ！', ems[choice] + ' vs ' + ems[npc], true);
    return;
  }
  
  if (res === 'win') {
    G.currentPlayer = PLAYER; G.phase = 'action';
    showJankenModal('🎉', 'じゃんけん勝利！', 'あなた: ' + ems[choice] + ' / おじさん: ' + ems[npc] + '<br><br>あなたの行動ターンです。', false);
  } else {
    G.currentPlayer = NPC; G.phase = 'action'; G.npcThinking = true;
    showJankenModal('😰', 'じゃんけん敗北…', 'あなた: ' + ems[choice] + ' / おじさん: ' + ems[npc] + '<br><br>おじさんの一手を見守りましょう。', false);
  }
};

function showJankenModal(icon, title, body, isDraw) {
  document.getElementById('modal-icon').innerHTML = icon;
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-body').innerHTML = body;
  var modal = document.getElementById('janken-modal');
  modal.classList.add('active');
  if (isDraw) {
    setTimeout(function() { closeModal(); }, 1100);
  }
}

window.closeModal = function() {
  document.getElementById('janken-modal').classList.remove('active');
  if (G.currentPlayer === NPC && G.phase === 'action') {
    G.log = 'おじさんがトングをギラつかせている…'; render();
    setTimeout(npcAct, 900);
  } else {
    render();
  }
};

window.selectAction = function(action) {
  if (G.actionDone || G.currentPlayer !== PLAYER) return;
  G.selectedAction = action; render();
};

window.cellClick = function(r, c) {
  if (G.phase !== 'action' || G.actionDone || !G.selectedAction || G.currentPlayer !== PLAYER) return;
  var cell = getCell(r, c); if (!cell) return;
  var valid = (G.selectedAction === 'bake') ? getBakeCells() : getMoveCells(PLAYER);
  var found = false; for (var i = 0; i < valid.length; i++) { if (valid[i] === cell) { found = true; break; } }
  if (!found) return;
  G.log = doAction(G.selectedAction, cell, PLAYER); G.actionDone = true; render();
};

window.confirmEnd = function() {
  endTurn(); G.log = '第' + G.turn + '回戦 — さあ、じゃんけんだ！'; render();
};

window.clickStartGame = function() { G.screen = 'play'; initGame(); G.screen = 'play'; startMeatSetupAnimation(); };
window.showHelp = function() { G.phase = 'help'; render(); };
window.closeHelp = function() { G.phase = 'janken'; G.screen = 'title'; render(); };
window.restart = function() { window.clickStartGame(); };

function render() {
  var app = document.getElementById('app');

  if (G.screen === 'title') {
    if (G.phase === 'help') {
      app.innerHTML = '<div class="gameover-wrap"><div class="result-title" style="color:var(--color-accent)">限界焼肉のルール</div><div class="help-text"><b>【どんなゲーム？】</b><br>じゃんけんに勝ってアクションを起こし、中央の網の上にある肉を相手の皿に押し付け合う限界突破の満腹バトルゲームです！<br><br><b>【勝利条件】</b><br>網の上の肉がすべてなくなった時、<b>食べた枚数が「少ない」ほうの勝ち</b>です（相手に多く食わせたら勝ち）。<br><br><b>【ゲームの流れ】</b><br>1. 画面下部でじゃんけんをします。<br>2. 勝った側がアクション（肉を育てる/進める）を選択します。<br>3. <b>「肉をひっくり返す（焼く）」</b>：生の肉(🥩)を焼き肉(🍖)へ進化させます。動かすにはまず焼く必要があります。<br>4. <b>「肉を前に進める」</b>：焼けた肉(🍖)を相手側へ1マス押し出します。一番奥まで押し込むと相手が強制的に完食（得点）！<br>5. 網の上の肉がすべて消えるまでターンを繰り返します。</div><button class="title-btn" style="width:80%" onclick="closeHelp()">タイトルへ戻る</button></div>';
    } else {
      app.innerHTML = '<div class="title-screen"><div class="title-logo">限界焼肉</div><div class="title-sub">〜 奢りを賭けたトング捌き 〜</div><div class="title-btns"><button class="title-btn main-btn" onclick="clickStartGame()">ゲーム開始</button><button class="title-btn" onclick="showHelp()">遊び方</button></div></div>';
    }
    return;
  }

  if (G.screen === 'gameover') { renderGameOver(app); return; }

  var npcEaten = G.scores[PLAYER];
  var ojiLevel = npcEaten >= 4 ? 2 : (npcEaten >= 2 ? 1 : 0);
  var ojiEmojis = ['👴', '😰', '😱'];
  var ojiSerifs = [
    '「若いんだからもっと食えよ〜」',
    '「お、おい…もう網の上に置くなよ…？」',
    '「ウプッ…お冷…誰かお冷をくれ……」'
  ];

  var gridHTML = '';
  for (var i = 0; i < G.cells.length; i++) {
    var cell = G.cells[i];
    var zc = cell.r === 0 ? 'zone-opp' : cell.r === 1 ? 'zone-mid' : 'zone-self';
    var validCells = (G.selectedAction && G.currentPlayer === PLAYER && !G.actionDone)
      ? (G.selectedAction === 'bake' ? getBakeCells() : getMoveCells(PLAYER))
      : [];
    var isSel = false;
    for (var j = 0; j < validCells.length; j++) { if (validCells[j] === cell) { isSel = true; break; } }
    var inner = '';
    if (cell.meat) {
      var meatContent = cell.meat.status === 'raw' ? '🥩' : '🍖';
      var badge = cell.meat.status === 'raw' ? '<span class="meat-badge badge-raw">生肉</span>' : '<span class="meat-badge badge-cooked">育った</span>';
      inner = '<div class="cell-inner"><div class="meat-icon">' + meatContent + '</div>' + badge + '</div>';
    }
    var cls = 'cell ' + zc + (isSel ? ' selectable' : '');
    var onclick = isSel ? 'onclick="cellClick(' + cell.r + ',' + cell.c + ')"' : '';
    gridHTML += '<div class="' + cls + '" ' + onclick + '>' + inner + '</div>';
  }

  var hasBake = getBakeCells().length > 0;
  var hasMove = getMoveCells(PLAYER).length > 0;

  var actionHTML = '';
  if (G.npcThinking) {
    actionHTML = '<div class="action-title npc-thinking">👴 おじさんが脂汗を流しながら長考している…</div>';
  } else if (G.phase === 'janken') {
    actionHTML = '<div class="action-title">出す手を選べ！ (ターン ' + G.turn + ')</div><div class="janken-btns">' + JK.map(function(j,i){ return '<button class="jbtn" onclick="playJanken(' + i + ')">' + j + '</button>'; }).join('') + '</div>';
  } else if (G.phase === 'action' && G.currentPlayer === PLAYER) {
    actionHTML = '<div class="action-title">行動を選択し、対象の肉をタップ！</div><div class="act-btns"><button class="abtn' + (G.selectedAction==='bake'?' active':'') + '" onclick="selectAction(\'bake\')"' + (hasBake?'':' disabled') + '>🔥 焼く</button><button class="abtn' + (G.selectedAction==='move'?' active':'') + '" onclick="selectAction(\'move\')"' + (hasMove?'':' disabled') + '>👉 進める</button>' + (G.actionDone ? '<button class="abtn abtn-submit" onclick="confirmEnd()">終了 ➔</button>' : '') + '</div>';
  }

  app.innerHTML = 
    '<div class="ojisan-container level-' + ojiLevel + '">'
    + '  <div class="ojisan-serif">' + ojiSerifs[ojiLevel] + '</div>'
    + '  <div class="ojisan-graphic-wrap"><div class="ojisan-character">' + ojiEmojis[ojiLevel] + '</div></div>'
    + '</div>'
    
    + '<div class="battle-arena">'
    + '  <div class="sidebar-scores">'
    + '    <div class="side-score-box opp"><div class="side-label">おじさん<br>完食</div><div class="side-num">' + G.scores[PLAYER] + ' <small>枚</small></div></div>'
    + '    <div class="vs-sign">VS</div>'
    + '    <div class="side-score-box self"><div class="side-label">あなた<br>完食</div><div class="side-num">' + G.scores[NPC] + ' <small>枚</small></div></div>'
    + '  </div>'
    + '  <div class="grid-container"><div class="grid">' + gridHTML + '</div></div>'
    + '</div>'
    
    + '<div class="action-panel">' + actionHTML + '</div>'
    + '<div class="log-box">' + G.log + '</div>';
}

function renderGameOver(app) {
  var myEaten = G.scores[NPC]; var npcEaten = G.scores[PLAYER];
  var playerWon = myEaten < npcEaten; var draw = myEaten === npcEaten;
  var icon = draw ? '🤝' : (playerWon ? '🎉' : '🤮');
  var title = draw ? '割り勘（引き分け）' : (playerWon ? '大勝利！大人の意地！' : '敗北…お腹が限界突破');
  var sub = draw ? '二人とも胃袋が等しく爆発。' : (playerWon ? 'おじさんにトドメのカルビを叩き込んだ！今日は奢りだ！' : '最後の一枚が喉を通らない…おじさんの不敵な笑みが…');
  app.innerHTML = '<div class="gameover-wrap"><div class="result-icon">' + icon + '</div><div class="result-title">' + title + '</div><div class="result-sub">' + sub + '</div><div class="result-scores"><div class="rscore-card' + (!playerWon&&!draw?' loser':'') + '"><div class="rscore-label">あなたの完食</div><div class="rscore-num">' + myEaten + ' 枚</div></div><div class="rscore-card' + (playerWon?' loser':'') + '"><div class="rscore-label">おじさんの完食</div><div class="rscore-num">' + npcEaten + ' 枚</div></div></div><button class="restart-btn" onclick="restart()">再戦する</button></div>';
}

render();
</script>
</body>
</html>
