<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>限界焼肉 -パーフェクトフィットエディション-</title>
<style>
:root {
  --color-bg: #121212;
  --color-card: #1e1e1e;
  --color-border: #333;
  --color-text-main: #ffffff;
  --color-text-sub: #aaaaaa;
  --color-accent: #e8a020;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--color-bg);
  color: var(--color-text-main);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; overflow: hidden;
}

/* アプリ全体を92vhに固定し、中身の伸縮だけで絶対にスクロールさせない構造 */
#app {
  width: 100%; max-width: 440px; height: 92vh; margin-top: 2vh;
  padding: 8px 12px; display: flex; flex-direction: column;
  position: relative; justify-content: flex-start; /* 上から順に詰める */
}

/* ★NEW: じゃんけん中央アクティブエリア（ルーレット風） */
.janken-center-zone {
  width: 72px; height: 130px; display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 6px;
  position: relative; perspective: 100px;
}
.jbtn-mini {
  width: 50px; height: 36px; font-size: 20px;
  border-radius: 8px; border: 1px solid var(--color-border);
  background: #2a2a2a; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
/* じゃんけん時以外は半透明で触れなくする（煩わしさ解消） */
.janken-center-zone.inactive {
  opacity: 0.15; pointer-events: none; filter: grayscale(1);
}
/* じゃんけんアクティブ時のルーレット風アニメ効果 */
.janken-center-zone.active .jbtn-mini {
  animation: rouletteUpDown 2s infinite ease-in-out;
  border-color: var(--color-accent);
  box-shadow: 0 0 8px rgba(232, 160, 32, 0.3);
}
.janken-center-zone.active .jbtn-mini:nth-child(2) { animation-delay: 0.3s; }
.janken-center-zone.active .jbtn-mini:nth-child(3) { animation-delay: 0.6s; }

@keyframes rouletteUpDown {
  0%, 100% { transform: translateZ(0); }
  50% { transform: translateZ(5px) scale(1.05); background: #3a3a3a; }
}

/* ★NEW: ポップアップ（後ろの盤面が見えるように透過） */
.modal-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); /* 透過度を下げて後ろの盤面を常に見えやすく */
  backdrop-filter: blur(1px); border-radius: 12px;
  display: flex; justify-content: center; align-items: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal-card {
  background: rgba(34, 34, 34, 0.92); /* カード自体もうっすら透過させて盤面の邪魔を減らす */
  border: 3px solid var(--color-accent); border-radius: 20px;
  padding: 24px; width: 85%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transform: scale(0.85); transition: transform 0.2s ease;
}
.modal-overlay.active .modal-card { transform: scale(1); }

.modal-title { font-size: 16px; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }

/* ★NEW: タップ可能なターゲット */
.selectable {
  outline: 4px solid var(--color-accent); outline-offset: -3px;
  background-color: #4a3410 !important; cursor: pointer; animation: pulse 0.6s infinite alternate;
}
@keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(0.97); } }

/* ★NEW: おじさん巨大背景エリアを画面上部に大きく配置 */
.ojisan-header {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  background: var(--color-card); border-radius: 12px; border: 1px solid var(--color-border);
  padding: 10px; position: relative;
}
.ojisan-avatar {
  width: 90px; height: 90px; /* サイズを大きく */
  border-radius: 50%; background: #2a3d2a;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px; border: 3px solid #555; overflow: hidden;
  transition: all 0.3s;
}
.level-1 .ojisan-avatar { background: #3d3d1a; border-color: var(--color-accent); }
.level-2 .ojisan-avatar { background: #3d1a1a; border-color: #ff6060; animation: tremble 0.15s infinite; }
.ojisan-serif {
  font-size: 13px; font-weight: bold; color: var(--color-accent); margin-top: 6px;
  min-height: 18px;
}

@keyframes tremble {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  20% { transform: translate(-1px, -1px) rotate(-1deg); }
  40% { transform: translate(-1px, 1px) rotate(1deg); }
  60% { transform: translate(1px, -1px) rotate(0deg); }
  80% { transform: translate(-1px, 1px) rotate(-1deg); }
  100% { transform: translate(1px, 1px) rotate(1deg); }
}

/* メインゲームエリア（左スコア、右盤面） */
.main-game-area {
  display: flex; flex: 1; gap: 8px; min-height: 0; /* 画面に収める */
}

/* 2. 左側：縦積みスコア＆じゃんけんスペース */
.sidebar-left {
  width: 85px; display: flex; flex-direction: column;
  background: var(--color-card); border-radius: 12px; border: 1px solid var(--color-border);
  padding: 8px 4px; justify-content: space-between; align-items: center;
  position: relative;
}
.side-score { text-align: center; width: 100%; }
.side-score.opp { color: #ff6060; }
.side-score.self { color: #60a0ff; }
.side-label { font-size: 10px; color: var(--color-text-sub); }
.side-num { font-size: 22px; font-weight: bold; }
.side-num small { font-size: 10px; }

/* じゃんけん中央アクティブエリア（ルーレット風） */
.janken-center-zone {
  width: 72px; height: 130px; display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 6px;
  position: relative; perspective: 100px;
}
.jbtn-mini {
  width: 50px; height: 36px; font-size: 20px;
  border-radius: 8px; border: 1px solid var(--color-border);
  background: #2a2a2a; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
/* じゃんけん時以外は半透明で触れなくする（煩わしさ解消） */
.janken-center-zone.inactive {
  opacity: 0.15; pointer-events: none; filter: grayscale(1);
}
/* じゃんけんアクティブ時のルーレット風アニメ効果 */
.janken-center-zone.active .jbtn-mini {
  animation: rouletteUpDown 2s infinite ease-in-out;
  border-color: var(--color-accent);
  box-shadow: 0 0 8px rgba(232, 160, 32, 0.3);
}
.janken-center-zone.active .jbtn-mini:nth-child(2) { animation-delay: 0.3s; }
.janken-center-zone.active .jbtn-mini:nth-child(3) { animation-delay: 0.6s; }

@keyframes rouletteUpDown {
  0%, 100% { transform: translateZ(0); }
  50% { transform: translateZ(5px) scale(1.05); background: #3a3a3a; }
}

/* 3. 右側：盤面を最大限広く確保 */
.grid-container {
  flex: 1; display: flex; flex-direction: column;
}
.grid {
  flex: 1; display: grid; grid-template-rows: repeat(3, 1fr); grid-template-columns: repeat(5, 1fr);
  gap: 5px; background: #1a1108; border-radius: 12px; padding: 8px;
  border: 3px solid #3d2b14; touch-action: manipulation;
}
.cell {
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  position: relative; transition: background-color 0.2s;
}
.zone-opp  { background: #261212; border: 1px solid #4a1a1a; }
.zone-mid  { background: #130f0a; border: 1px solid #332514; }
.zone-self { background: #122612; border: 1px solid #1a4a1a; }

.selectable {
  outline: 3px solid var(--color-accent); outline-offset: -3px;
  background-color: #4a3410 !important; cursor: pointer;
  animation: pulse 0.8s infinite alternate;
}
@keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(0.97); } }

.cell-inner { display: flex; flex-direction: column; align-items: center; }
.meat-icon { font-size: 26px; line-height: 1; }
.meat-badge { font-size: 8px; font-weight: bold; padding: 1px 3px; border-radius: 3px; margin-top: 1px; }
.badge-raw    { background: #1a4a1a; color: #a0ffa0; }
.badge-cooked { background: #542b00; color: #ffb050; }

/* 下部操作パネル（片手で届く位置） */
.action-panel {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: 12px;
  padding: 12px;
}
.action-title { font-size: 12px; color: var(--color-text-sub); text-align: center; margin-bottom: 10px; }

.janken-btns { display: flex; gap: 10px; justify-content: center; }
.jbtn {
  font-size: 32px; flex: 1; max-width: 80px; height: 64px;
  border-radius: 10px; border: 1px solid var(--color-border);
  background: #2a2a2a; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.jbtn:active { background: #444; transform: scale(0.95); }

.act-btns { display: flex; gap: 10px; justify-content: center; width: 100%; }
.abtn {
  flex: 1; padding: 12px 0; border-radius: 10px;
  border: 1px solid var(--color-border); background: #2a2a2a;
  font-size: 14px; font-weight: bold; color: var(--color-text-main); cursor: pointer;
}
.abtn:disabled { opacity: 0.3; }
.abtn.active { background: #542b00; color: #ffb050; border-color: var(--color-accent); }
.abtn-submit { background: var(--color-accent); color: #000; border: none; }

.log-box {
  font-size: 13px; color: var(--color-text-sub);
  min-height: 48px; text-align: center; padding: 8px 12px;
  background: var(--color-card); border-radius: 10px;
  border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center;
}

/* ===================================================
   タイトル画面
   =================================================== */
.title-screen {
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  height: 100%; text-align: center; padding: 20px;
}
.title-logo {
  font-size: 48px; font-weight: 900; color: #ff3333; text-shadow: 3px 3px 0px #000, 0 0 20px rgba(232,160,32,0.6);
  margin-bottom: 8px; letter-spacing: 2px; animation: glow 1.5s ease-in-out infinite alternate;
}
.title-sub { font-size: 14px; color: var(--color-text-sub); margin-bottom: 60px; font-weight: bold; }
.title-btns { display: flex; flex-direction: column; gap: 16px; width: 80%; max-width: 260px; }
.title-btn {
  padding: 16px 0; border-radius: 12px; border: 2px solid #444; background: #222;
  color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.1s;
}
.title-btn:active { transform: scale(0.95); }
.title-btn.main-btn { background: var(--color-accent); color: #000; border: none; font-size: 18px; }

@keyframes glow { from { text-shadow: 0 0 10px rgba(255,50,50,0.5); } to { text-shadow: 0 0 25px rgba(232,160,32,0.9); } }

/* ===================================================
   ゲームオーバー画面
   =================================================== */
.gameover-wrap {
  text-align: center; padding: 30px 15px; height: 100%;
  background: var(--color-card); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.result-icon { font-size: 64px; margin-bottom: 10px; }
.result-title { font-size: 24px; font-weight: bold; }
.result-sub { font-size: 13px; color: var(--color-text-sub); margin-bottom: 20px; padding: 0 10px; }
.result-scores { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; width: 100%; }
.rscore-card { padding: 10px; border-radius: 8px; border: 1px solid var(--color-border); background: #252525; flex: 1; }
.rscore-card.loser { border: 2px solid #ff6060; background: #331515; }
.rscore-label { font-size: 11px; color: var(--color-text-sub); }
.rscore-num { font-size: 24px; font-weight: bold; }
.restart-btn { width: 100%; max-width: 200px; padding: 12px 0; border-radius: 10px; background: var(--color-accent); border: none; font-size: 15px; font-weight: bold; color: #000; cursor: pointer; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const PLAYER = 0, NPC = 1;
const JK = ['✊','✌️','✋'];
const JK_N = ['グー','チョキ','パー'];

var G = {};

function initGame() {
  var cells = [];
  for (var r = 0; r < 3; r++) {
    for (var c = 0; c < 5; c++) {
      // 最初はミート(肉)をnull（空っぽ）で生成し、演出アニメで1個ずつ入れる
      cells.push({ r: r, c: c, meat: null, isAnimating: false });
    }
  }
  G = {
    screen: 'title', // title, play, gameover
    phase: 'setup',  // setup(肉並べ中), janken, action, confirm
    currentPlayer: PLAYER, actionDone: false, selectedAction: null,
    scores: [0, 0], gameOver: false, log: 'いざ、限界焼肉勝負！',
    cells: cells, turn: 1, npcThinking: false
  };
}
initGame();

// NEW: お肉を左から順番に網にセットしていく演出
function startMeatSetupAnimation() {
  G.phase = 'setup';
  G.log = '店員が新鮮なお肉を運んできた…！';
  render();

  var midRowCols = [0, 1, 2, 3, 4]; // 中央列の列インデックス
  var delay = 350; // お肉が並ぶ間隔 (ミリ秒)

  midRowCols.forEach(function(colIndex, index) {
    setTimeout(function() {
      // 中央列 (r=1) のセルに対象の肉をセット
      var cell = getCell(1, colIndex);
      if (cell) {
        cell.meat = { status: 'raw' };
        render(); // お肉を乗せて再描画（CSSアニメが発火）
      }

      // 5個すべての肉が並び終わったら、じゃんけんフェーズに移行
      if (index === midRowCols.length - 1) {
        setTimeout(function() {
          G.phase = 'janken';
          G.log = '第' + G.turn + '回戦 — さあ、じゃんけんだ！';
          render();
        }, 500);
      }
    }, (index + 1) * delay);
  });
}

function getCell(r, c) {
  for (var i = 0; i < G.cells.length; i++) { if (G.cells[i].r === r && G.cells[i].c === c) return G.cells[i]; }
  return null;
}
function jkResult(a, b) {
  if (a === b) return 'draw';
  if ((a===0&&b===2)||(a===1&&b===0)||(a===2&&b===1)) return 'win';
  return 'lose';
}
function canBake(cell) { return cell.meat !== null && cell.meat.status === 'raw'; }
function canMove(cell, player) {
  if (!cell.meat || cell.meat.status !== 'cooked') return false;
  var dir = (player === PLAYER) ? -1 : 1;
  var nr = cell.r + dir;
  if (nr < 0 || nr > 2) return true;
  return getCell(nr, cell.c).meat === null;
}
function getBakeCells() { return G.cells.filter(canBake); }
function getMoveCells(player) { return G.cells.filter(function(c) { return canMove(c, player); }); }
function remainingMeat() { return G.cells.filter(function(c) { return c.meat !== null; }).length; }

function doAction(action, cell, player) {
  var msg = '';
  if (action === 'bake') {
    cell.meat.status = 'cooked';
    msg = '網の上の肉が育った！🔥';
  } else if (action === 'move') {
    var dir = (player === PLAYER) ? -1 : 1;
    var nr = cell.r + dir;
    var meatCopy = { status: cell.meat.status };
    cell.meat = null;
    if (nr < 0 || nr > 2) {
      G.scores[player]++;
      msg = (player === PLAYER) ? '🍖 おじさんの皿に押し込んだ！' : '😱 自分の皿に滑り込んできた…！';
      if (remainingMeat() === 0) { G.gameOver = true; G.screen = 'gameover'; }
    } else {
      var target = getCell(nr, cell.c);
      target.meat = meatCopy;
      msg = '肉の位置をスライドさせた！';
    }
  }
  return msg;
}

function endTurn() {
  G.actionDone = false; G.selectedAction = null; G.phase = 'janken'; G.turn++;
}

function npcAct() {
  var moveCells = getMoveCells(NPC); var bakeCells = getBakeCells(); var action, cell;
  var frontMove = moveCells.filter(function(c) { return c.r === 2; });
  if (frontMove.length > 0) { action = 'move'; cell = frontMove[Math.floor(Math.random() * frontMove.length)]; }
  else if (moveCells.length > 0 && Math.random() < 0.6) { action = 'move'; cell = moveCells[Math.floor(Math.random() * moveCells.length)]; }
  else if (bakeCells.length > 0) { action = 'bake'; cell = bakeCells[Math.floor(Math.random() * bakeCells.length)]; }
  else if (moveCells.length > 0) { action = 'move'; cell = moveCells[Math.floor(Math.random() * moveCells.length)]; }
  else { endTurn(); G.log = 'おじさんはお腹いっぱいでパスした。'; G.npcThinking = false; render(); return; }

  G.log = doAction(action, cell, NPC); G.npcThinking = false;
  if (!G.gameOver) endTurn();
  render();
}

window.playJanken = function(choice) {
  if (G.phase !== 'janken' || G.npcThinking) return;
  var npc = Math.floor(Math.random() * 3); var res = jkResult(choice, npc);
  var ems = ['✊','✌️','✋']; var emoji = ems[choice] + ' vs ' + ems[npc];
  if (res === 'draw') { G.log = emoji + ' あいこ！もう一度！'; render(); return; }
  if (res === 'win') {
    G.currentPlayer = PLAYER; G.log = emoji + ' あなたの勝ち！行動を選んでください。'; G.phase = 'action'; render();
  } else {
    G.currentPlayer = NPC; G.log = emoji + ' おじさんの勝ち…'; G.phase = 'action'; G.npcThinking = true; render();
    setTimeout(npcAct, 1200);
  }
};

window.selectAction = function(action) {
  if (G.actionDone || G.currentPlayer !== PLAYER) return;
  G.selectedAction = action; render();
};

window.cellClick = function(r, c) {
  if (G.phase !== 'action' || G.actionDone || !G.selectedAction || G.currentPlayer !== PLAYER) return;
  var cell = getCell(r, c); if (!cell) return;
  var valid = (G.selectedAction === 'bake') ? getBakeCells() : getMoveCells(PLAYER);
  var found = false; for (var i = 0; i < valid.length; i++) { if (valid[i] === cell) { found = true; break; } }
  if (!found) return;
  G.log = doAction(G.selectedAction, cell, PLAYER); G.actionDone = true; render();
};

window.confirmEnd = function() {
  endTurn(); G.log = '第' + G.turn + '回戦 — さあ、じゃんけんだ！'; render();
};

window.clickStartGame = function() {
  G.screen = 'play';
  initGame(); // 初期化
  G.screen = 'play'; // プレイ画面へ切替
  startMeatSetupAnimation(); // アニメーション開始
};

window.changeScreen = function(screenName) { G.screen = screenName; render(); };
window.showHelp = function() { G.phase = 'help'; render(); };
window.closeHelp = function() { G.phase = 'janken'; G.screen = 'title'; render(); };
window.restart = function() { window.clickStartGame(); };

function render() {
  var app = document.getElementById('app');

  // 1. タイトル画面
  if (G.screen === 'title') {
    if (G.phase === 'help') {
      app.innerHTML = '<div class="gameover-wrap"><div class="result-title" style="color:var(--color-accent)">限界焼肉のルール</div><div class="help-text"><b>【どんなゲーム？】</b><br>じゃんけんに勝ってアクションを起こし、中央の網の上にある肉を相手の皿に押し付け合う限界突破の満腹バトルゲームです！<br><br><b>【勝利条件】</b><br>網の上の肉がすべてなくなった時、<b>食べた枚数が「少ない」ほうの勝ち</b>です（相手に多く食わせたら勝ち）。<br><br><b>【ゲームの流れ】</b><br>1. 画面中央のポップアップでじゃんけんをします。<br>2. 勝った側がアクション（肉を育てる/進める）を選択します。<br>3. <b>「肉をひっくり返す（焼く）」</b>：生の肉(🥩)を焼き肉(🍖)へ進化させます。動かすにはまず焼く必要があります。<br>4. <b>「肉を前に進める」</b>：焼けた肉(🍖)を相手側へ1マス押し出します。一番奥まで押し込むと相手が強制的に完食（得点）！<br>5. 網の上の肉がすべて消えるまでターンを繰り返します。</div><button class="title-btn" style="width:80%" onclick="closeHelp()">タイトルへ戻る</button></div>';
    } else {
      app.innerHTML = '<div class="title-screen"><div class="title-logo">限界焼肉</div><div class="title-sub">〜 奢りを賭けたトング捌き 〜</div><div class="title-btns"><button class="title-btn main-btn" onclick="clickStartGame()">ゲーム開始</button><button class="title-btn" onclick="showHelp()">遊び方</button></div></div>';
    }
    return;
  }

  // 2. ゲームオーバー画面
  if (G.screen === 'gameover') { renderGameOver(app); return; }

  // 3. プレイ画面
  var npcActive = G.currentPlayer === NPC;
  var playerActive = G.currentPlayer === PLAYER && G.phase === 'action';

  var npcEaten = G.scores[PLAYER];
  var ojiLevel = npcEaten >= 4 ? 2 : (npcEaten >= 2 ? 1 : 0);
  var ojiEmojis = ['👴', '😰', '😱'];
  var ojiSerifs = [
    '「若いんだからもっと食えよ〜」',
    '「お、おい…もう網の上に置くなよ…？」',
    '’ウプッ…お冷…誰かお冷をくれ……’
  ];

  // おじさん巨大背景エリアのHTML
  var ojiAvatarHTML = IMAGES['ojisan_' + ojiLevel] 
    ? '<img src="' + IMAGES['ojisan_' + ojiLevel] + '" style="width:100%;height:100%;object-fit:cover;">' 
    : ojiEmojis[ojiLevel];

  // 網（グリッド）の描画
  var gridHTML = '';
  for (var i = 0; i < G.cells.length; i++) {
    var cell = G.cells[i];
    var zc = cell.r === 0 ? 'zone-opp' : cell.r === 1 ? 'zone-mid' : 'zone-self';
    var validCells = (G.selectedAction && G.currentPlayer === PLAYER && !G.actionDone)
      ? (G.selectedAction === 'bake' ? getBakeCells() : getMoveCells(PLAYER))
      : [];
    var isSel = false;
    for (var j = 0; j < validCells.length; j++) { if (validCells[j] === cell) { isSel = true; break; } }
    var inner = '';
    if (cell.meat) {
      var imgKey = cell.meat.status === 'raw' ? 'meat_raw' : 'meat_cooked';
      var meatContent = IMAGES[imgKey] 
        ? '<img src="' + IMAGES[imgKey] + '" style="width:36px;height:36px;object-fit:contain;">'
        : (cell.meat.status === 'raw' ? '🥩' : '🍖');
      var badge = cell.meat.status === 'raw'
        ? '<span class="meat-badge badge-raw">生肉</span>'
        : '<span class="meat-badge badge-cooked">育った</span>';
      inner = '<div class="cell-inner"><div class="meat-icon">' + meatContent + '</div>' + badge + '</div>';
    }
    var cls = 'cell ' + zc + (isSel ? ' selectable' : '');
    var onclick = isSel ? 'onclick="cellClick(' + cell.r + ',' + cell.c + ')"' : '';
    gridHTML += '<div class="' + cls + '" ' + onclick + '>' + inner + '</div>';
  }

  var hasBake = getBakeCells().length > 0;
  var hasMove = getMoveCells(PLAYER).length > 0;

  // 下部操作パネルの表示切り替え
  var actionHTML = '';
  if (G.npcThinking) {
    actionHTML = '<div class="npc-thinking">👴 おじさんがトングを握りしめて脂汗を流している…</div>';
  } else if (G.phase === 'janken') {
    actionHTML = '<div class="action-title">出す手を選べ！ (ターン ' + G.turn + ')</div>'
      + '<div class="janken-btns">'
      + JK.map(function(j,i){ return '<button class="jbtn" onclick="playJanken(' + i + ')">' + j + '</button>'; }).join('')
      + '</div>';
  } else if (G.phase === 'action' && G.currentPlayer === PLAYER) {
    actionHTML = '<div class="action-title">行動を選択し、対象の肉をタップ！</div>'
      + '<div class="act-btns">'
      + '<button class="abtn' + (G.selectedAction==='bake'?' active':'') + '" onclick="selectAction(\'bake\')"' + (hasBake?'':' disabled') + '>🔥 肉をひっくり返す</button>'
      + '<button class="abtn' + (G.selectedAction==='move'?' active':'') + '" onclick="selectAction(\'move\')"' + (hasMove?'':' disabled') + '>👉 前に進める</button>'
      + (G.actionDone ? '<button class="abtn abtn-submit" onclick="confirmEnd()">ターン終了 ➔</button>' : '')
      + '</div>';
  }

  // ★改善：おじさん巨大背景エリアと、スコア・ログの下部集約
  app.innerHTML = 
    // 上部：おじさん巨大背景
    '<div class="ojisan-header level-' + ojiLevel + '">'
    + '<div class="avatar-wrap"><div class="ojisan-avatar">' + ojiAvatarHTML + '</div></div>'
    + '<div class="ojisan-serif">' + ojiSerifs[ojiLevel] + '</div>'
    + '</div>'
    
    // スコアリア（左スコア、右盤面）
    + '<div class="scoreboard">'
    + '<div class="score-box' + (playerActive?' active':'') + '">'
    + '<div class="score-label">あなたの被害</div>'
    + '<div class="score-num">' + G.scores[NPC] + ' <small>枚完食</small></div>'
    + '</div>'
    + '<div class="score-divider">VS</div>'
    + '<div class="score-box' + (npcActive?' npc-active':'') + '">'
    + '<div class="score-label">おじさんの被害</div>'
    + '<div class="score-num">' + G.scores[PLAYER] + ' <small>枚完食</small></div>'
    + '</div>'
    + '</div>'
    
    // 網（グリッド）の最大化と上寄せ最適化
    + '<div class="grid-container">'
    + '<div class="grid">' + gridHTML + '</div>'
    + '</div>'
    
    // 下部：操作とログの集約
    + '<div class="action-panel">' + actionHTML + '</div>'
    + '<div class="log-box">' + G.log + '</div>';
}

function renderGameOver(app) {
  var myEaten = G.scores[NPC]; var npcEaten = G.scores[PLAYER];
  var playerWon = myEaten < npcEaten; var draw = myEaten === npcEaten;
  var icon = draw ? '🤝' : (playerWon ? '🎉' : '🤮');
  var title = draw ? '割り勘（引き分け）' : (playerWon ? '大勝利！大人の意地！' : '敗北…お腹が限界突破');
  var sub = draw ? '二人とも胃袋が等しく爆発。明日から揃って愛妻弁当（ヘルシー）です。' : (playerWon ? 'おじさんの胃袋にトドメのカルビを叩き込んだ！今日は奢ってもらおう！' : '最後の一枚が喉を通らない…おじさんの不敵な笑みが視界で滲む…');
  app.innerHTML = '<div class="gameover-wrap"><div class="result-icon">' + icon + '</div><div class="result-title">' + title + '</div><div class="result-sub">' + sub + '</div><div class="result-scores"><div class="rscore-card' + (!playerWon&&!draw?' loser':'') + '"><div class="rscore-label">あなたが食べた量</div><div class="rscore-num">' + myEaten + ' 枚</div></div><div class="rscore-card' + (playerWon?' loser':'') + '"><div class="rscore-label">おじさんが食べた量</div><div class="rscore-num">' + npcEaten + ' 枚</div></div></div><button class="restart-btn" onclick="restart()">もう一軒行く（再戦）</button></div>';
}

render();
</script>
</body>
</html>
