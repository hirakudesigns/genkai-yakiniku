<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>限界焼肉 -パーフェクトフィットエディション-</title>
<style>
:root {
  --color-bg: #121212;
  --color-card: #1e1e1e;
  --color-border: #333;
  --color-text-main: #ffffff;
  --color-text-sub: #aaaaaa;
  --color-accent: #e8a020;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--color-bg);
  color: var(--color-text-main);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; overflow: hidden;
}

/* アプリ全体を92vhに固定し、中身の伸縮だけで絶対にスクロールさせない構造 */
#app {
  width: 100%; max-width: 440px; height: 92vh; margin-top: 2vh;
  padding: 8px 12px; display: flex; flex-direction: column;
  position: relative; justify-content: flex-start; /* 上から順に詰める */
}

/* ===================================================
   タイトル画面
   =================================================== */
.title-screen {
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  height: 100%; text-align: center; padding: 20px;
}
.title-logo {
  font-size: 44px; font-weight: 900; color: #ff3333; text-shadow: 3px 3px 0px #000, 0 0 20px rgba(232,160,32,0.6);
  margin-bottom: 8px; letter-spacing: 2px; animation: glow 1.5s ease-in-out infinite alternate;
}
.title-sub { font-size: 13px; color: var(--color-text-sub); margin-bottom: 40px; font-weight: bold; }
.title-btns { display: flex; flex-direction: column; gap: 14px; width: 80%; max-width: 250px; }
.title-btn {
  padding: 14px 0; border-radius: 12px; border: 2px solid #444; background: #222;
  color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.1s;
}
.title-btn:active { transform: scale(0.95); }
.title-btn.main-btn { background: var(--color-accent); color: #000; border: none; font-size: 17px; }

@keyframes glow { from { text-shadow: 0 0 10px rgba(255,50,50,0.5); } to { text-shadow: 0 0 25px rgba(232,160,32,0.9); } }

/* ===================================================
   ゲーム本編：レイアウト（1画面縦フィット＆盤面最大化）
   =================================================== */
.opp-header {
  display: flex; align-items: flex-end; width: 100%; height: 100px; flex-shrink: 0;
}
.opp-score-zone { width: 35%; display: flex; flex-direction: column; padding-left: 8px; }
.score-title-big { font-size: 16px; font-weight: bold; line-height: 1.2; color: var(--color-text-sub); }
.score-num-big { font-size: 48px; font-weight: 900; line-height: 1; letter-spacing: -2px; color: #fff; }
.score-unit-big { font-size: 16px; font-weight: bold; margin-left: 4px; }
.ojisan-container { width: 65%; height: 100%; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; }
.ojisan-avatar-big {
  width: 90px; height: 90px; border-radius: 50%; background: #2a3d2a;
  display: flex; align-items: center; justify-content: center; font-size: 48px;
  border: 4px solid #555; transition: all 0.3s;
}
.level-1 .ojisan-avatar-big { background: #3d3d1a; border-color: var(--color-accent); }
.level-2 .ojisan-avatar-big { background: #3d1a1a; border-color: #ff6060; animation: tremble 0.15s infinite; }

@keyframes tremble {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  20% { transform: translate(-1px, -1px) rotate(-1deg); }
  40% { transform: translate(-1px, 1px) rotate(1deg); }
  60% { transform: translate(1px, -1px) rotate(0deg); }
  80% { transform: translate(-1px, 1px) rotate(-1deg); }
  100% { transform: translate(1px, 1px) rotate(1deg); }
}

.opp-comment-bar {
  background: #ffffff; color: #000000; border: 3px solid #000000; border-radius: 30px;
  padding: 4px 14px; font-size: 13px; font-weight: bold; text-align: center;
  width: 100%; margin-top: 2px; margin-bottom: 6px; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  min-height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ★改善：縦の余りをすべて網の拡大に充て、隙間を完全に潰す */
.grid-container {
  flex: 1; /* 残りの縦スペースをすべて引き受ける */
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  width: 100%; min-height: 0; /* flex内の縮小用おまじない */
}
.grid {
  display: grid; grid-template-rows: repeat(3, 1fr); grid-template-columns: repeat(5, 1fr);
  gap: 6px; background: #1a1108; border-radius: 12px; padding: 10px;
  border: 4px solid #3d2b14; 
  width: 100%; height: 100%; /* コンテナいっぱいに大きく広がる */
  max-height: 280px; /* 縦長のスマホでも間延びしすぎないよう絶妙な上限を設定 */
  aspect-ratio: 5 / 3.3;
}
.cell { border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; }
.zone-opp  { background: #261212; border: 1px solid #4a1a1a; }
.zone-mid  { background: #130f0a; border: 1px solid #332514; }
.zone-self { background: #122612; border: 1px solid #1a4a1a; }

.selectable {
  outline: 4px solid var(--color-accent); outline-offset: -3px;
  background-color: #4a3410 !important; cursor: pointer; animation: pulse 0.6s infinite alternate;
}
@keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(0.96); } }

.cell-inner {
  display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%;
  animation: meatPopIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}
.meat-icon { font-size: 32px; line-height: 1; } /* 網が大きくなった分、お肉も一回り拡大 */
.meat-badge { font-size: 10px; font-weight: bold; padding: 1px 4px; border-radius: 3px; margin-top: 2px; }
.badge-raw    { background: #1a4a1a; color: #a0ffa0; }
.badge-cooked { background: #542b00; color: #ffb050; }

@keyframes meatPopIn {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.mini-log { font-size: 12px; color: var(--color-text-sub); text-align: center; margin-top: 6px; margin-bottom: 2px; min-height: 16px; flex-shrink: 0; }

/* ★改善：自分のスコアを網のすぐ下に吸い付かせ、上寄配置に */
.self-footer { display: flex; flex-direction: column; width: 100%; padding-left: 8px; margin-top: 2px; flex-shrink: 0; }

/* ===================================================
   操作系：画面下部にぴったり張り付くポップアップ
   =================================================== */
.bottom-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.15); border-radius: 12px;
  display: flex; justify-content: center; align-items: flex-end;
  padding-bottom: 65px; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
.bottom-overlay.active { opacity: 1; pointer-events: auto; }

.bottom-card {
  background: rgba(28, 28, 28, 0.96); border: 3px solid var(--color-accent); border-radius: 18px;
  padding: 14px 20px; width: 92%; text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.7);
  transform: translateY(20px); transition: transform 0.2s ease;
}
.bottom-overlay.active .bottom-card { transform: translateY(0); }
.bottom-title { font-size: 14px; font-weight: bold; margin-bottom: 12px; letter-spacing: 1px; color: #fff; }

.janken-row { display: flex; gap: 12px; justify-content: center; }
.jbtn-huge {
  font-size: 34px; flex: 1; height: 64px; border-radius: 12px;
  border: 2px solid #444; background: #2a2a2a; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.jbtn-huge:active { background: #444; transform: scale(0.94); }

.action-col { display: flex; flex-direction: column; gap: 8px; }
.act-btn-huge {
  width: 100%; padding: 12px 0; border-radius: 10px; border: 2px solid #444;
  background: #2a2a2a; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer;
}
.act-btn-huge:disabled { opacity: 0.15; }
.act-btn-huge.selected { background: #542b00; color: #ffb050; border-color: var(--color-accent); }
.act-btn-submit { background: var(--color-accent); color: #000; border: none; font-size: 15px; }

/* ===================================================
   画面中央：じゃんけん結果モーダル
   =================================================== */
.center-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); border-radius: 12px;
  display: flex; justify-content: center; align-items: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
.center-overlay.active { opacity: 1; pointer-events: auto; }

.center-card {
  background: #1e1e1e; border: 4px solid #444; border-radius: 24px;
  padding: 24px; width: 82%; text-align: center; box-shadow: 0 10px 35px rgba(0,0,0,0.8);
  transform: scale(0.8); transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.center-overlay.active .center-card { transform: scale(1); }

.jk-result-huge { font-size: 44px; font-weight: 900; line-height: 1.1; margin-bottom: 5px; letter-spacing: 2px; }
.jk-res-win  { color: #40ff40; text-shadow: 0 0 15px rgba(64,255,64,0.6); }
.jk-res-lose { color: #ff4040; text-shadow: 0 0 15px rgba(255,40,40,0.6); }
.jk-res-draw { color: #ffff40; text-shadow: 0 0 15px rgba(255,255,64,0.6); }

.jk-vs-detail { font-size: 18px; margin-bottom: 20px; color: #eee; background: #2a2a2a; padding: 6px 0; border-radius: 10px; }
.jk-next-btn {
  width: 100%; padding: 14px 0; border-radius: 12px; background: var(--color-accent);
  color: #000; font-size: 16px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(232,160,32,0.3);
}

/* ゲームオーバー・ヘルプ用 */
.gameover-wrap {
  text-align: center; padding: 20px 15px; height: 100%; width: 100%;
  background: var(--color-card); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.result-icon { font-size: 54px; margin-bottom: 10px; }
.result-title { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
.result-sub { font-size: 13px; color: var(--color-text-sub); margin-bottom: 20px; }
.restart-btn { width: 100%; max-width: 200px; padding: 12px 0; border-radius: 10px; background: var(--color-accent); border: none; font-size: 15px; font-weight: bold; color: #000; cursor: pointer; }

.help-text { font-size: 13px; text-align: left; color: #ccc; line-height: 1.6; max-height: 220px; overflow-y: auto; margin-bottom: 15px; padding: 5px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const PLAYER = 0, NPC = 1;
const JK = ['✊','✌️','✋'];

const IMAGES = { meat_raw: '', meat_cooked: '', ojisan_0: '', ojisan_1: '', ojisan_2: '' };
var G = {};

function initGame() {
  var cells = [];
  for (var r = 0; r < 3; r++) {
    for (var c = 0; c < 5; c++) {
      cells.push({ r: r, c: c, meat: null });
    }
  }
  G = {
    screen: 'title', // title, play, gameover
    phase: 'setup',  // setup, janken, janken_result, action, confirm
    currentPlayer: PLAYER, actionDone: false, selectedAction: null,
    scores: [0, 0], gameOver: false, log: 'いざ、限界焼肉勝負！',
    cells: cells, turn: 1, npcThinking: false,
    lastJanken: { result: '', detailText: '', classStr: '' }
  };
}
initGame();

function startMeatSetupAnimation() {
  G.phase = 'setup';
  G.log = '新鮮なお肉が網に並べられています…';
  render();

  var midRowCols = [0, 1, 2, 3, 4];
  var delay = 250; // さらにテンポ良く

  midRowCols.forEach(function(colIndex, index) {
    setTimeout(function() {
      var cell = getCell(1, colIndex);
      if (cell) {
        cell.meat = { status: 'raw' };
        render();
      }

      if (index === midRowCols.length - 1) {
        setTimeout(function() {
          G.phase = 'janken';
          G.log = '第' + G.turn + '回戦 — じゃんけんポン！';
          render();
        }, 350);
      }
    }, (index + 1) * delay);
  });
}

function getCell(r, c) {
  for (var i = 0; i < G.cells.length; i++) { if (G.cells[i].r === r && G.cells[i].c === c) return G.cells[i]; }
  return null;
}
function jkResult(a, b) {
  if (a === b) return 'draw';
  if ((a===0&&b===2)||(a===1&&b===0)||(a===2&&b===1)) return 'win';
  return 'lose';
}
function canBake(cell) { return cell.meat !== null && cell.meat.status === 'raw'; }
function canMove(cell, player) {
  if (!cell.meat || cell.meat.status !== 'cooked') return false;
  var dir = (player === PLAYER) ? -1 : 1;
  var nr = cell.r + dir;
  if (nr < 0 || nr > 2) return true;
  return getCell(nr, cell.c).meat === null;
}
function getBakeCells() { return G.cells.filter(canBake); }
function getMoveCells(player) { return G.cells.filter(function(c) { return canMove(c, player); }); }
function remainingMeat() { return G.cells.filter(function(c) { return c.meat !== null; }).length; }

function doAction(action, cell, player) {
  var msg = '';
  if (action === 'bake') {
    cell.meat.status = 'cooked';
    msg = '網の上の肉が育った！🔥';
  } else if (action === 'move') {
    var dir = (player === PLAYER) ? -1 : 1;
    var nr = cell.r + dir;
    var meatCopy = { status: cell.meat.status };
    cell.meat = null;
    if (nr < 0 || nr > 2) {
      G.scores[player]++;
      msg = (player === PLAYER) ? '🍖 おじさんの皿に押し込んだ！' : '😱 自分の皿に滑り込んできた…！';
      if (remainingMeat() === 0) { G.gameOver = true; G.screen = 'gameover'; }
    } else {
      var target = getCell(nr, cell.c);
      target.meat = meatCopy;
      msg = '肉の位置をスライドさせた！';
    }
  }
  return msg;
}

function endTurn() {
  G.actionDone = false; G.selectedAction = null; G.phase = 'janken'; G.turn++;
}

function npcAct() {
  var moveCells = getMoveCells(NPC); var bakeCells = getBakeCells(); var action, cell;
  var frontMove = moveCells.filter(function(c) { return c.r === 2; });
  if (frontMove.length > 0) { action = 'move'; cell = frontMove[Math.floor(Math.random() * frontMove.length)]; }
  else if (moveCells.length > 0 && Math.random() < 0.6) { action = 'move'; cell = moveCells[Math.floor(Math.random() * moveCells.length)]; }
  else if (bakeCells.length > 0) { action = 'bake'; cell = bakeCells[Math.floor(Math.random() * bakeCells.length)]; }
  else if (moveCells.length > 0) { action = 'move'; cell = moveCells[Math.floor(Math.random() * moveCells.length)]; }
  else { endTurn(); G.log = 'おじさんはお腹いっぱいでパスした。'; G.npcThinking = false; render(); return; }

  G.log = doAction(action, cell, NPC); G.npcThinking = false;
  if (!G.gameOver) endTurn();
  render();
}

window.playJanken = function(choice) {
  if (G.phase !== 'janken' || G.npcThinking) return;
  var npc = Math.floor(Math.random() * 3); var res = jkResult(choice, npc);
  var ems = ['✊','✌️','✋'];
  
  G.phase = 'janken_result';
  
  if (res === 'draw') {
    G.lastJanken = { result: 'あいこ！', detailText: ems[choice] + '  vs  ' + ems[npc], classStr: 'jk-res-draw' };
    G.log = 'あいこ！もう一本！';
    render();
    setTimeout(function() {
      G.phase = 'janken';
      render();
    }, 1000);
  } else if (res === 'win') {
    G.currentPlayer = PLAYER;
    G.lastJanken = { result: '勝ち！', detailText: ems[choice] + ' (あなた) vs (相手) ' + ems[npc], classStr: 'jk-res-win' };
    G.log = 'じゃんけん勝利！行動ターン。';
    render();
  } else {
    G.currentPlayer = NPC;
    G.lastJanken = { result: '負け…', detailText: ems[choice] + ' (あなた) vs (相手) ' + ems[npc], classStr: 'jk-res-lose' };
    G.log = 'じゃんけん敗北…相手のターン。';
    render();
  }
};

window.closeJankenResult = function() {
  if (G.currentPlayer === PLAYER) {
    G.phase = 'action';
  } else {
    G.phase = 'action'; G.npcThinking = true;
    setTimeout(npcAct, 1200);
  }
  render();
};

window.selectAction = function(action) {
  if (G.actionDone || G.currentPlayer !== PLAYER) return;
  G.selectedAction = action; render();
};

window.cellClick = function(r, c) {
  if (G.phase !== 'action' || G.actionDone || !G.selectedAction || G.currentPlayer !== PLAYER) return;
  var cell = getCell(r, c); if (!cell) return;
  var valid = (G.selectedAction === 'bake') ? getBakeCells() : getMoveCells(PLAYER);
  var found = false; for (var i = 0; i < valid.length; i++) { if (valid[i] === cell) { found = true; break; } }
  if (!found) return;
  G.log = doAction(G.selectedAction, cell, PLAYER); G.actionDone = true; render();
};

window.confirmEnd = function() {
  endTurn(); G.log = '第' + G.turn + '回戦 — じゃんけんポン！'; render();
};

window.clickStartGame = function() {
  G.screen = 'play';
  initGame();
  G.screen = 'play';
  startMeatSetupAnimation();
};

window.changeScreen = function(screenName) { G.screen = screenName; render(); };
window.showHelp = function() { G.phase = 'help'; render(); };
window.closeHelp = function() { G.phase = 'janken'; G.screen = 'title'; render(); };
window.restart = function() { window.clickStartGame(); };

function render() {
  var app = document.getElementById('app');

  if (G.screen === 'title') {
    if (G.phase === 'help') {
      app.innerHTML = '<div class="gameover-wrap"><div class="result-title" style="color:var(--color-accent)">限界焼肉のルール</div><div class="help-text"><b>【どんなゲーム？】</b><br>じゃんけんに勝ってアクションを起こし、中央の網の上にある肉を相手の皿に押し付け合う満腹バトルゲームです！<br><br><b>【勝利条件】</b><br>網の上の肉がすべてなくなった時、<b>食べた枚数が「少ない」ほうの勝ち</b>です。<br><br><b>【ゲームの流れ】</b><br>1. 画面下部でじゃんけんをします。<br>2. 勝った側がアクション（肉を育てる/進める）を選択します。<br>3. <b>「肉をひっくり返す（焼く）」</b>：生の肉(🥩)を焼き肉(🍖)へ進化させます。<br>4. <b>「肉を前に進める」</b>：焼けた肉(🍖)を相手側へ1マス押し出します。一番奥まで押し込むと相手が強制完食！</div><button class="title-btn" style="width:80%" onclick="closeHelp()">タイトルへ戻る</button></div>';
    } else {
      app.innerHTML = '<div class="title-screen"><div class="title-logo">限界焼肉</div><div class="title-sub">〜 奢りを賭けたトング捌き 〜</div><div class="title-btns"><button class="title-btn main-btn" onclick="clickStartGame()">ゲーム開始</button><button class="title-btn" onclick="showHelp()">遊び方</button></div></div>';
    }
    return;
  }

  if (G.screen === 'gameover') { renderGameOver(app); return; }

  var npcEaten = G.scores[PLAYER];
  var ojiLevel = npcEaten >= 4 ? 2 : (npcEaten >= 2 ? 1 : 0);
  var ojiEmojis = ['👴', '😰', '😱'];
  var ojiSerifs = ['「若いんだからもっと食えよ〜」', '「おいおい…もう網の上に置くなよ？」', '「ウプッ…お冷…誰かお冷をくれ…」'];
  var ojiAvatarHTML = IMAGES['ojisan_' + ojiLevel] ? '<img src="' + IMAGES['ojisan_' + ojiLevel] + '" style="width:100%;height:100%;object-fit:cover;">' : ojiEmojis[ojiLevel];

  var gridHTML = '';
  for (var i = 0; i < G.cells.length; i++) {
    var cell = G.cells[i]; var zc = cell.r === 0 ? 'zone-opp' : cell.r === 1 ? 'zone-mid' : 'zone-self';
    var validCells = (G.selectedAction && G.currentPlayer === PLAYER && G.phase === 'action' && !G.actionDone) ? (G.selectedAction === 'bake' ? getBakeCells() : getMoveCells(PLAYER)) : [];
    var isSel = false; for (var j = 0; j < validCells.length; j++) { if (validCells[j] === cell) { isSel = true; break; } }
    var inner = '';
    if (cell.meat) {
      var imgKey = cell.meat.status === 'raw' ? 'meat_raw' : 'meat_cooked';
      var meatContent = IMAGES[imgKey] ? '<img src="' + IMAGES[imgKey] + '" style="width:44px;height:44px;object-fit:contain;">' : (cell.meat.status === 'raw' ? '🥩' : '🍖');
      var badge = cell.meat.status === 'raw' ? '<span class="meat-badge badge-raw">生</span>' : '<span class="meat-badge badge-cooked">焼</span>';
      inner = '<div class="cell-inner"><div class="meat-icon">' + meatContent + '</div>' + badge + '</div>';
    }
    var cls = 'cell ' + zc + (isSel ? ' selectable' : '');
    var onclick = isSel ? 'onclick="cellClick(' + cell.r + ',' + cell.c + ')"' : '';
    gridHTML += '<div class="' + cls + '" ' + onclick + '>' + inner + '</div>';
  }

  var showBottomOverlay = false;
  var bottomContentHTML = '';

  if (G.phase === 'janken' && !G.npcThinking) {
    showBottomOverlay = true;
    bottomContentHTML = '<div class="bottom-title">👊 じゃんけんポン！ ✋</div>'
      + '<div class="janken-row">'
      + '  <button class="jbtn-huge" onclick="playJanken(0)">✊</button>'
      + '  <button class="jbtn-huge" onclick="playJanken(1)">✌️</button>'
      + '  <button class="jbtn-huge" onclick="playJanken(2)">✋</button>'
      + '</div>';
  } else if (G.phase === 'action' && G.currentPlayer === PLAYER && !G.selectedAction) {
    showBottomOverlay = true;
    var hasBake = getBakeCells().length > 0; var hasMove = getMoveCells(PLAYER).length > 0;
    bottomContentHTML = '<div class="bottom-title">【あなたのターン】行動を選択</div>'
      + '<div class="action-col">'
      + '  <button class="act-btn-huge" onclick="selectAction(\'bake\')"' + (hasBake?'':' disabled') + '>🔥 肉をひっくり返す</button>'
      + '  <button class="act-btn-huge" onclick="selectAction(\'move\')"' + (hasMove?'':' disabled') + '>👉 肉を前に進める</button>'
      + '</div>';
  } else if (G.phase === 'action' && G.actionDone) {
    showBottomOverlay = true;
    bottomContentHTML = '<div class="bottom-title">網の上の状況を確定します</div>'
      + '<div class="action-col">'
      + '  <button class="act-btn-huge pop-btn-submit" onclick="confirmEnd()">確定してターン終了 ➔</button>'
      + '</div>';
  }

  var showCenterOverlay = (G.phase === 'janken_result');
  var centerContentHTML = '';
  if (showCenterOverlay) {
    var isDraw = G.lastJanken.result === 'あいこ！';
    centerContentHTML = '<div class="jk-result-huge ' + G.lastJanken.classStr + '">じゃんけん' + G.lastJanken.result + '</div>'
      + '<div class="jk-vs-detail">' + G.lastJanken.detailText + '</div>'
      + (isDraw ? '<p style="color:#aaa; font-size:14px; animation:pulse 0.5s infinite alternate;">もう一度ぽん！</p>' 
                : '<button class="jk-next-btn" onclick="closeJankenResult()">トングを構える ➔</button>');
  }

  app.innerHTML = 
    // 1. 相手ヘッダー
    '<div class="opp-header level-' + ojiLevel + '">'
    + '  <div class="opp-score-zone">'
    + '    <span class="score-title-big">相手</span>'
    + '    <div style="display:flex; align-items:baseline;">'
    + '      <span class="score-num-big">' + G.scores[PLAYER] + '</span><span class="score-unit-big">枚</span>'
    + '    </div>'
    + '  </div>'
    + '  <div class="ojisan-container">'
    + '    <div class="ojisan-avatar-big">' + ojiAvatarHTML + '</div>'
    + '  </div>'
    + '</div>'
    
    + '<div class="opp-comment-bar">'
    + (G.npcThinking ? '👴「ふむ…トングの角度が重要だな…」' : ojiSerifs[ojiLevel])
    + '</div>'

    // 2. 中央の焼き網（縦スペース限界拡大）
    + '<div class="grid-container">'
    + '  <div class="grid">' + gridHTML + '</div>'
    + '</div>'

    + '<div class="mini-log">' + G.log + '</div>'

    // 3. 自分ヘッダー（網の直後に上寄せ）
    + '<div class="self-footer">'
    + '  <span class="score-title-big">自分</span>'
    + '  <div style="display:flex; align-items:baseline;">'
    + '    <span class="score-num-big">' + G.scores[NPC] + '</span><span class="score-unit-big">枚</span>'
    + '  </div>'
    + '</div>'

    // 4. 下部操作ポップアップ
    + '<div class="bottom-overlay ' + (showBottomOverlay ? 'active' : '') + '">'
    + '  <div class="bottom-card">' + bottomContentHTML + '</div>'
    + '</div>'

    // 5. 大画面中央じゃんけんモーダル
    + '<div class="center-overlay ' + (showCenterOverlay ? 'active' : '') + '">'
    + '  <div class="center-card">' + centerContentHTML + '</div>'
    + '</div>';
}

function renderGameOver(app) {
  var myEaten = G.scores[NPC]; var npcEaten = G.scores[PLAYER];
  var playerWon = myEaten < npcEaten; var draw = myEaten === npcEaten;
  var icon = draw ? '🤝' : (playerWon ? '🎉' : '🤮');
  var title = draw ? '割り勘（引き分け）' : (playerWon ? '大勝利！大人の意地！' : '敗北…お腹が限界突破');
  var sub = draw ? '二人とも胃袋が等しく爆発。' : (playerWon ? 'おじさんの胃袋にトドメのカルビを叩き込んだ！今日は奢ってもらおう！' : '最後の一枚が喉を通らない…');
  app.innerHTML = '<div class="gameover-wrap"><div class="result-icon">' + icon + '</div><div class="result-title">' + title + '</div><div class="result-sub">' + sub + '</div><div class="result-scores"><div class="rscore-card' + (!playerWon&&!draw?' loser':'') + '"><div class="rscore-label">あなたが食べた量</div><div class="rscore-num">' + myEaten + ' 枚</div></div><div class="rscore-card' + (playerWon?' loser':'') + '"><div class="rscore-label">おじさんが食べた量</div><div class="rscore-num">' + npcEaten + ' 枚</div></div></div><button class="restart-btn" onclick="restart()">もう一軒行く（再戦）</button></div>';
}

render();
</script>
</body>
</html>
